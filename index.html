<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIP Extension Creator</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007cba; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #005a87; }
        .result { margin-top: 20px; padding: 10px; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h1>Create SIP Extension</h1>
    
    <form id="extensionForm">
        <div class="form-group">
            <label for="extension">Extension Number:</label>
            <input type="text" id="extension" name="extension" required>
        </div>
        
        <div class="form-group">
            <label for="name">Display Name:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="secret">Password:</label>
            <input type="password" id="secret" name="secret" required>
        </div>
        
        <button type="submit">Create Extension</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('extensionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                extension: document.getElementById('extension').value,
                name: document.getElementById('name').value,
                secret: document.getElementById('secret').value
            };
            
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Creating extension...';
            
            try {
                const response = await fetch('/api/sip/create-extension', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRF-TOKEN': document.querySelector('meta[name="csrf-token"]')?.getAttribute('content') || ''
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `<div class="result success">${data.message}</div>`;
                    document.getElementById('extensionForm').reset();
                } else {
                    resultDiv.innerHTML = `<div class="result error">${data.message}</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="result error">Error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
